<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할 일(To Do)</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
    crossorigin="anonymous">
</head>

<body>
    <div class="container mt-3">
        <div class="card shadow">
            <div class="card-body">
                <h4>To-Do</h4>
                <div class="input-group">
                    <!-- input#todo-input.form-control 자동생성-->
                    <input id="todo-input" class="form-control" placeholder="할 일 입력">
                        
                    <!-- button#add-btn.btn.btn-primary 자동생성-->
                    <button id="add-btn" class="btn btn-primary">추가</button>
                </div>

                <hr>

                    <!-- ul#todo-list.list-group 자동생성 -->
                    <ul id="todo-list" class="list-group">
                    </ul>
            </div>
        </div>
    </div>
    <script src="todo.js"></script>

</body>
</html>
