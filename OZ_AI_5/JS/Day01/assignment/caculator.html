<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>콘솔창 계산기 프로그램</title>
</head>

<body>
    <h1>콘솔창 계산기 프로그램</h1>

    <h2>Window OS의 경우</h2>

    <hr>

    <p>1. F12 키를 눌러 콘솔 창을 여세요.</p>
    <p>2. start()를 콘솔창에 입력하여 계산기를 실행합니다.</p>

    <h2>Mac OS의 경우</h2>

    <hr>

    <p>1. Option + Command + i 키를 눌러 콘솔 창을 여세요.</p>
    <p>2. start()를 콘솔창에 입력하여 계산기를 실행합니다.</p>

    <script src="caculator.js"></script>
</body>

</html>
